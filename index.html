<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ER Gallery - Pro Version</title>
    <style>
        /* --- 기본 설정 --- */
        body { 
            margin: 0; background: #000; color: #fff; font-family: sans-serif; 
            overflow-x: hidden; -webkit-user-select: none; user-select: none;
        }
        html { scroll-behavior: smooth; }

        /* --- 1. 메인화면: 정사각 6장 구성 --- */
        .gallery {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 2px; padding: 2px; max-width: 500px; margin: 0 auto;
        }
        .thumb-container { aspect-ratio: 1 / 1; overflow: hidden; background: #111; cursor: pointer; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* 하단 버튼 */
        .bottom-buttons { display: flex; justify-content: space-around; padding: 40px 0; align-items: center; }
        .bottom-buttons button { background: transparent; border: none; color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; }

        /* --- 2. 하위 페이지 (풀스크린 팝업) --- */
        #popup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: none;
        }

        /* [수정] 헤더가 항상 사진 폭 안에서 중앙 정렬되도록 */
        .popup-header {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: calc(100vh * 9 / 16); /* 사진의 가로폭에 맞춤 */
            display: flex; justify-content: space-between; align-items: center;
            padding: env(safe-area-inset-top, 30px) 20px 20px;
            box-sizing: border-box; z-index: 1005;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            pointer-events: none;
        }
        #close-btn { font-size: 2.5rem; color: #fff; pointer-events: auto; cursor: pointer; }
        #upload-date { font-size: 1.2rem; font-weight: bold; }

        /* 슬라이더 설정 */
        .popup-slider {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            height: 100%; width: 100%; z-index: 1001;
            -webkit-overflow-scrolling: touch;
        }
        .popup-slider::-webkit-scrollbar { display: none; }

        .slide-item {
            min-width: 100%; height: 100%; scroll-snap-align: start;
            scroll-snap-stop: always; display: flex; align-items: center; justify-content: center;
        }

        /* [수정] 팝업 사진: 모바일은 꽉 차게, PC는 9:16 비율 유지 */
        .slide-item img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* 기본은 화면 꽉 채우기 */
            pointer-events: none;
        }

        /* [추가] PC 환경(가로가 긴 화면)에서 사진 비율 고정 */
        @media (min-aspect-ratio: 9/16) {
            .slide-item img {
                width: auto;
                aspect-ratio: 9 / 16; /* 가로가 넓어지면 9:16 유지 */
            }
        }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <div id="main-page">
        <div class="gallery" id="gallery-grid"></div>
        <div class="bottom-buttons">
            <button id="prev-btn" onclick="changePage(-1)">이전</button>
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})">맨위로</button>
            <button id="next-btn" onclick="changePage(1)">다음</button>
        </div>
    </div>

    <div id="popup">
        <div class="popup-header">
            <span id="close-btn">✕</span>
            <span id="upload-date">2026.03.17</span>
        </div>
        <div class="popup-slider" id="slider"></div>
    </div>

    <script>
        let allImages = []; 
        let currentPage = 1;
        const itemsPerPage = 30;

        fetch('./data.json').then(res => res.json()).then(data => {
            allImages = data;
            renderGallery();
        });

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = ''; 
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const currentItems = allImages.slice(start, end);
            currentItems.forEach((imgSrc, index) => {
                const thumb = document.createElement('div');
                thumb.className = 'thumb-container';
                thumb.innerHTML = `<img src="data/${imgSrc}" loading="lazy">`;
                thumb.onclick = () => openPopup(index, currentItems);
                grid.appendChild(thumb);
            });
            document.getElementById('prev-btn').disabled = (currentPage === 1);
            document.getElementById('next-btn').disabled = (end >= allImages.length);
        }

        function changePage(direction) {
            currentPage += direction;
            renderGallery();
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function openPopup(index, data) {
            const popup = document.getElementById('popup');
            const slider = document.getElementById('slider');
            slider.innerHTML = data.map(img => `<div class="slide-item"><img src="data/${img}"></div>`).join('');
            popup.style.display = 'block';
            document.body.style.overflow = 'hidden';
            const targetSlide = slider.children[index];
            slider.scrollTo({ left: targetSlide.offsetLeft, behavior: 'auto' });
        }

        document.getElementById('close-btn').onclick = () => {
            document.getElementById('popup').style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        window.addEventListener('keydown', (e) => {
            const slider = document.getElementById('slider');
            if (e.key === 'ArrowRight') slider.scrollBy({left: window.innerWidth, behavior: 'smooth'});
            if (e.key === 'ArrowLeft') slider.scrollBy({left: -window.innerWidth, behavior: 'smooth'});
            if (e.key === 'Escape') document.getElementById('close-btn').click();
        });
    </script>
</body>
</html>
